# GymOS - Configuración de rotación de logs
# Copiar a: /etc/logrotate.d/gymos

/opt/gymos/data/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 gymos gymos
    sharedscripts
    postrotate
        # Señalizar al servicio para que reabra los archivos de log
        systemctl kill --kill-who=main --signal=USR1 gymos.service 2>/dev/null || true
    endscript
}

/var/log/nginx/gymos-*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-data adm
    sharedscripts
    postrotate
        nginx -s reopen 2>/dev/null || true
    endscript
}
