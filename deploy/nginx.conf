# GymOS - Configuración Nginx
# Copiar a: /etc/nginx/sites-available/gymos
# Activar con: ln -s /etc/nginx/sites-available/gymos /etc/nginx/sites-enabled/gymos
#
# Para HTTPS con Let's Encrypt:
#   certbot --nginx -d tudominio.com
#
# Para HTTPS con certificado autofirmado (LAN sin dominio):
#   Descomenta la sección SSL manual y comenta la sección "HTTP only".

# ── Rate limiting ─────────────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── Upstream ──────────────────────────────────────────────────────────────────
upstream gymos_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;                  # reemplaza con tu dominio si tienes uno

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS principal ───────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;                  # reemplaza con tu dominio si tienes uno

    # ── SSL: Let's Encrypt (reemplaza con tus rutas reales) ──────────────────
    # ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── SSL: Certificado autofirmado (para red local sin dominio) ────────────
    ssl_certificate     /opt/gymos/data/certs/cert.pem;
    ssl_certificate_key /opt/gymos/data/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Seguridad HTTP ───────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                   always;
    add_header X-Content-Type-Options    nosniff                                always;
    add_header X-XSS-Protection          "1; mode=block"                        always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"      always;
    add_header Permissions-Policy        "camera=*, microphone=()"              always;

    # ── Tamaño máximo de upload (audio: 50 MB) ───────────────────────────────
    client_max_body_size 55M;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Archivos estáticos con caché larga ───────────────────────────────────
    location ~* \.(ico|css|js|woff2?|ttf|svg|png|jpg|jpeg|webp)$ {
        proxy_pass http://gymos_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Rate limit en login ───────────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=10 nodelay;
        limit_req_status 429;

        proxy_pass         http://gymos_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── API general ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=60 nodelay;

        proxy_pass         http://gymos_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }

    # ── App principal (SPA) ───────────────────────────────────────────────────
    location / {
        proxy_pass         http://gymos_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/gymos-access.log;
    error_log  /var/log/nginx/gymos-error.log;
}
